name: 每日涨停数据抓取

on:
  schedule:
    # 北京时间 15:35 = UTC 07:35，只在周一到周五运行
    - cron: '35 7 * * 1-5'
  workflow_dispatch:
    # 支持手动触发，并可指定日期（留空则抓当天）
    inputs:
      trade_date:
        description: '交易日期（格式 YYYYMMDD，留空抓今天）'
        required: false
        default: ''

jobs:
  fetch:
    name: 抓取并写入 Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: 安装依赖
        run: pip install -r scripts/requirements.txt

      - name: 抓取数据
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          DATE="${{ github.event.inputs.trade_date }}"
          if [ -n "$DATE" ]; then
            echo "手动触发，日期：$DATE"
            python scripts/fetch_daily.py "$DATE"
          else
            echo "定时触发，抓取今日数据"
            python scripts/fetch_daily.py
          fi

      - name: 抓取失败时发通知
        if: failure()
        run: |
          echo "::error::数据抓取失败，请检查 AKShare 或 Supabase 连接"
